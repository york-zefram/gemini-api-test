<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ZEFRAM Gemini 3 - Latest</title>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; padding: 40px; }
        input, button { padding: 12px; background: #111; color: #0f0; border: 1px solid #0f0; border-radius: 4px; }
        input { width: 400px; }
        button { cursor: pointer; font-weight: bold; }
        button:hover { background: #0f0; color: #000; }
        #output { margin-top: 20px; white-space: pre-wrap; padding: 20px; border: 1px dotted #0f0; min-height: 100px; }
    </style>
</head>
<body>
    <h3>[ SYSTEM EXECUTABLE: GEMINI 3 FLASH ]</h3>
    <input type="password" id="key" placeholder="PASTE YOUR API KEY HERE">
    <button id="btn">RUN PROCESS</button>
    <div id="output">READY...</div>

    <script type="module">
        // 2026年現在の最新SDKをインポート
        import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

        document.getElementById('btn').onclick = async () => {
            const out = document.getElementById('output');
            const key = document.getElementById('key').value;
            if(!key) return alert("API KEY REQUIRED");
            
            out.innerText = "EXECUTING...";

            try {
                const genAI = new GoogleGenerativeAI(key);
                
                // お客様のコードで使用されていた最新モデル名を指定
                // プレビュー版のため、404が出る場合は "gemini-1.5-flash" も併記可能
                const model = genAI.getGenerativeModel({ model: "gemini-3-flash-preview" });

                const result = await model.generateContent("「開通成功。Gemini 3 起動しました」と出力せよ。");
                const response = await result.response;
                out.innerText = "SUCCESS >> " + response.text();
            } catch (e) {
                out.innerText = "FATAL ERROR >> " + e.message;
            }
        };
    </script>
</body>
</html>
