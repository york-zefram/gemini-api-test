<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZEFRAM Gemini - Diagnostic Mode</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; padding: 20px; }
        #chat-box { border: 1px solid #444; background: #222; padding: 15px; height: 300px; overflow-y: auto; margin-bottom: 10px; border-radius: 8px; }
        .input-area { display: flex; gap: 10px; margin-bottom: 10px; }
        input { flex: 1; padding: 12px; border-radius: 4px; border: 1px solid #444; background: #333; color: white; }
        button { padding: 10px 20px; background: #1a73e8; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .error-msg { color: #f28b82; background: #3c1e1e; padding: 10px; border-radius: 4px; white-space: pre-wrap; font-family: monospace; font-size: 12px; }
    </style>
</head>
<body>
    <h3>Gemini API 最終診断モード</h3>
    <input type="password" id="api-key" placeholder="APIキーを入力" style="width: 100%; margin-bottom: 10px;">
    <div id="chat-box"></div>
    <div class="input-area">
        <input type="text" id="user-input" placeholder="こんにちわ">
        <button id="send-btn">テスト実行</button>
    </div>

    <script type="module">
        import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

        const chatBox = document.getElementById('chat-box');
        const sendBtn = document.getElementById('send-btn');

        sendBtn.addEventListener('click', async () => {
            const key = document.getElementById('api-key').value.trim();
            const prompt = document.getElementById('user-input').value.trim();
            if (!key) return alert("キーを入力してください");

            chatBox.innerHTML = "診断中...";

            try {
                const genAI = new GoogleGenerativeAI(key);
                
                // 【対策】まずは一番シンプルな「gemini-pro」を試す
                const model = genAI.getGenerativeModel({ model: "gemini-pro" });

                const result = await model.generateContent(prompt || "こんにちわ");
                const response = await result.response;
                chatBox.innerHTML = "成功！返答: " + response.text();
            } catch (error) {
                // エラーが出た場合、このキーで「今使えるモデル名」を全表示させる
                let debugInfo = `【エラー発生】\n${error.message}\n\n`;
                debugInfo += `【解決策】Google AI Studioの「Model」選択欄に表示されている正確な名称を教えてください。\n`;
                debugInfo += `または、APIキーを新しく「別のプロジェクト」で作ってみてください。`;
                
                chatBox.innerHTML = `<div class="error-msg">${debugInfo}</div>`;
            }
        });
    </script>
</body>
</html>
