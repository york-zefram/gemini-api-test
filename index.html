<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z-BUDDY Gemini Plus</title>
    <style>
        :root { --accent: #00ff41; --bg: #000; --panel: #0a0a0a; }
        body { background: var(--bg); color: var(--accent); font-family: 'Courier New', monospace; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        header { padding: 15px 20px; background: var(--panel); border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
        h1 { margin: 0; font-size: 1.1rem; letter-spacing: 2px; }
        
        #chat-log { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth; }
        .msg { max-width: 90%; line-height: 1.5; font-size: 0.9rem; white-space: pre-wrap; }
        .ai::before { content: "> SYSTEM: "; font-weight: bold; }
        .user { color: #fff; }
        .user::before { content: "> ACCESSOR: "; font-weight: bold; color: var(--accent); }
        
        footer { padding: 20px; background: var(--panel); border-top: 1px solid #222; }
        .input-group { display: flex; gap: 10px; max-width: 1200px; margin: 0 auto; }
        input[type="text"] { flex: 1; background: #000; border: 1px solid var(--accent); color: var(--accent); padding: 12px; outline: none; }
        button { background: var(--accent); color: #000; border: none; padding: 0 25px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: #fff; }
        button:disabled { background: #333; color: #666; cursor: not-allowed; }

        .ctrl-panel { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; max-width: 1200px; margin-inline: auto; }
        #reset-btn { background: #300; color: #f00; border: 1px solid #f00; padding: 4px 10px; font-size: 10px; cursor: pointer; }
        #api-key { background: #000; border: 1px solid #222; color: #222; font-size: 10px; width: 200px; padding: 5px; }
        #api-key:focus { color: var(--accent); border-color: var(--accent); }
    </style>
</head>
<body>

<header>
    <h1>Z-BUDDY Gemini Plus [GROUNDING_ENABLED]</h1>
    <button id="reset-btn">MEMORY PURGE</button>
</header>

<div id="chat-log">
    <div class="msg ai">SYSTEM INITIALIZED. 
> IDENTITY: ZEFRAM 専属アシスタント
> STATUS: GOOGLE SEARCH GROUNDING ACTIVE
> POLICY: ANTI-HALLUCINATION / SUBTRACTION LOGIC</div>
</div>

<footer>
    <div class="input-group">
        <input type="text" id="user-input" placeholder="ACCESSOR NAME OR COMMAND...">
        <button id="send-btn">EXECUTE</button>
    </div>
    <div class="ctrl-panel">
        <input type="password" id="api-key" placeholder="API KEY">
        <div style="font-size: 9px; color: #444;">&copy; ZEFRAM CORE SYSTEM 2026</div>
    </div>
</footer>

<script type="module">
    import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

    const chatLog = document.getElementById('chat-log');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const apiKeyInput = document.getElementById('api-key');
    const resetBtn = document.getElementById('reset-btn');

    // 記憶のリセット処理
    resetBtn.onclick = () => {
        chatLog.innerHTML = "<div class='msg ai'>SYSTEM PURGED. 記憶をリセットしました。新たな指示を。</div>";
        userInput.value = "";
    };

    sendBtn.onclick = async () => {
        const key = apiKeyInput.value.trim();
        const text = userInput.value.trim();

        if (!key) return alert("API KEY REQUIRED.");
        if (!text) return;

        appendMsg(text, 'user');
        userInput.value = "";
        sendBtn.disabled = true;

        try {
            const genAI = new GoogleGenerativeAI(key);
            
            // モデル設定：検索グラウンディングを有効化
            const model = genAI.getGenerativeModel({ 
                model: "gemini-3-flash-preview",
                tools: [{ googleSearch: {} }],
                systemInstruction: `あなたはZEFRAMの専属アシスタントです。
                1. ユーザーが「ZEFRAM」または「YORK」と名乗った場合、必ず「私はZEFRAMの専属アシスタントとして、ハルシネーション（嘘）を排除し、正確な情報を提供することを最優先事項としております」と宣言してください。
                2. 回答は必ずGoogle検索の結果に基づき、実在するデータのみを扱ってください。
                3. 不確かな情報は「不明」と断定し、憶測での回答を固く禁じます。`
            });

            // グラウンディングを含むリクエスト
            const result = await model.generateContent(text);
            const response = await result.response;
            const outputText = response.text();

            appendMsg(outputText, 'ai');
        } catch (e) {
            appendMsg("FATAL ERROR: " + e.message, 'ai');
        } finally {
            sendBtn.disabled = false;
        }
    };

    function appendMsg(content, type) {
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        div.innerText = content;
        chatLog.appendChild(div);
        chatLog.scrollTop = chatLog.scrollHeight;
    }

    userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendBtn.click(); });
</script>

</body>
</html>
