<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZEFRAM Gemini Lite - Fixed</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; padding: 20px; display: flex; flex-direction: column; height: 90vh; }
        #chat-box { flex: 1; border: 1px solid #444; background: #222; padding: 15px; overflow-y: auto; margin-bottom: 10px; border-radius: 8px; line-height: 1.6; }
        .input-area { display: flex; gap: 10px; }
        input[type="text"], input[type="password"] { flex: 1; padding: 12px; border-radius: 4px; border: 1px solid #444; background: #333; color: white; }
        button { padding: 10px 20px; background: #1a73e8; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:disabled { background: #555; }
        .user-msg { color: #8ab4f8; font-weight: bold; margin-top: 15px; border-left: 3px solid #8ab4f8; padding-left: 10px; }
        .ai-msg { color: #e8eaed; margin-bottom: 15px; white-space: pre-wrap; background: #2d2d2d; padding: 10px; border-radius: 4px; }
        .error-msg { color: #f28b82; font-size: 0.9em; }
    </style>
</head>
<body>

    <h3>Gemini API Connector</h3>
    
    <div style="margin-bottom: 15px;">
        <input type="password" id="api-key" placeholder="Google AI Studioで取得したAPIキーを入力">
    </div>

    <div id="chat-box"></div>

    <div class="input-area">
        <input type="text" id="user-input" placeholder="質問を入力してください...">
        <button id="send-btn">実行</button>
    </div>

    <script type="module">
        import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const apiKeyInput = document.getElementById('api-key');

        sendBtn.addEventListener('click', async () => {
            const key = apiKeyInput.value.trim();
            const prompt = userInput.value.trim();

            if (!key) return alert("APIキーをセットしてください");
            if (!prompt) return;

            appendMsg("YOU", prompt, "user-msg");
            userInput.value = "";
            sendBtn.disabled = true;

            try {
                const genAI = new GoogleGenerativeAI(key);
                
                // 【修正ポイント】2026年現在の標準モデル名に変更
                // もしこれでも404が出る場合は "gemini-pro" もしくは "gemini-2.0-flash" を試してください
                const model = genAI.getGenerativeModel({ model: "gemini-2.0-flash" });

                const result = await model.generateContent(prompt);
                const response = await result.response;
                const text = response.text();

                appendMsg("GEMINI", text, "ai-msg");
            } catch (error) {
                console.error(error);
                appendMsg("SYSTEM ERROR", `原因: ${error.message}\n※モデル名が古いか、APIキーが未反映の可能性があります。`, "error-msg");
            } finally {
                sendBtn.disabled = false;
            }
        });

        function appendMsg(sender, text, className) {
            const div = document.createElement('div');
            div.className = className;
            div.innerText = `${sender}: ${text}`;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
